<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولد أكواد التفعيل - د. ليلى سكاك</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-dark: #0f172a;
            --primary-light: #1e293b;
            --gold: #d4af37;
            --text-color: #f8fafc;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--primary-dark);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .generator-container {
            background: var(--primary-light);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(212, 175, 55, 0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        h1 {
            color: var(--gold);
            margin-bottom: 30px;
            font-size: 1.8rem;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: right;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            font-weight: bold;
            font-size: 1.1rem;
            color: #cbd5e1;
        }

        input {
            padding: 12px;
            font-size: 1.1rem;
            border-radius: 8px;
            border: 1px solid var(--gold);
            background: rgba(15, 23, 42, 0.8);
            color: #fff;
            font-family: monospace;
            direction: ltr;
        }

        button {
            background: linear-gradient(135deg, var(--gold), #b8982c);
            color: var(--primary-dark);
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-family: inherit;
            transition: transform 0.2s;
            margin-bottom: 20px;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .result-box {
            background: rgba(15, 23, 42, 0.8);
            border: 2px dashed var(--gold);
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .code-display {
            font-size: 1.5rem;
            color: var(--gold);
            font-family: monospace;
            letter-spacing: 2px;
            margin: 15px 0;
            user-select: all;
            background: #000;
            padding: 10px;
            border-radius: 5px;
        }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 8px 15px;
            font-size: 1rem;
            margin-bottom: 0;
            width: auto;
        }
    </style>
</head>

<body>

    <div class="generator-container">
        <h1><i class="fas fa-key"></i> لوحة التحكم: توليد الأكواد</h1>

        <div class="input-group">
            <label>1. اطلبي من العميل أن يرسل لك "رمز جهازه" (Device ID) الذي سيظهر له في التطبيق، وضعيه هنا:</label>
            <input type="text" id="client-device-id" placeholder="مثال: X7B9K2">
        </div>

        <button onclick="generateCode()"><i class="fas fa-magic"></i> توليد كود التفعيل (صالح لـ 30 يوم)</button>

        <div class="result-box" id="result-box">
            <p>أرسلي هذا الكود للعميل ليضعه في التطبيق:</p>
            <div class="code-display" id="generated-code"></div>
            <button class="copy-btn" onclick="copyCode()"><i class="fas fa-copy"></i> نسخ الكود</button>
            <p style="color: #4ade80; font-size: 0.9rem; margin-top: 10px;">هذا الكود مشفر، سيعمل فقط على جهاز هذا
                العميل، وسينتهي بعد 30 يوماً من لحظة إدخاله.</p>
        </div>
    </div>

    <script>
        // Simple hash function to generate a secure-looking code
        function hashCode(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash; // Convert to 32bit integer
            }
            return Math.abs(hash).toString(16).toUpperCase();
        }

        function generateCode() {
            const deviceId = document.getElementById('client-device-id').value.trim().toUpperCase();
            if (!deviceId) {
                alert("الرجاء إدخال رمز جهاز العميل أولاً.");
                return;
            }

            // Secret key only you and the app know
            const SECRET_SALT = "LailaClinic123!@#";

            // The code is a hash of the DeviceID + Secret.
            // When the app receives this code, it will run the same hash on the user's current DeviceID.
            // If they match, it activates. If the user changes device (different DeviceID), the hash won't match.
            const rawString = deviceId + SECRET_SALT;
            let finalCode = hashCode(rawString);

            // Make it look like a nice serial key (e.g. XXXX-XXXX)
            if (finalCode.length < 8) finalCode = finalCode.padStart(8, '0');
            finalCode = finalCode.slice(0, 4) + "-" + finalCode.slice(4, 8);

            document.getElementById('generated-code').innerText = finalCode;
            document.getElementById('result-box').style.display = 'block';
        }

        function copyCode() {
            const code = document.getElementById('generated-code').innerText;
            navigator.clipboard.writeText(code).then(() => {
                alert("تم نسخ الكود بنجاح!");
            });
        }
    </script>
</body>

</html>
